# ============================================================================
# Hoophouse502 — Docker Compose
# ============================================================================
#
# Brings up the web app on http://localhost:3000
#
# Usage:
#   docker compose up --build      (build + start)
#   docker compose up -d            (detached)
#   docker compose down             (stop + remove)
#
# Environment variables can be added under `environment:` when integrating
# Stripe/Square API keys in the next iteration.
# ============================================================================

services:
  web:
    build: .
    container_name: hoophouse502-web
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      # --- Add API keys here when ready ---
      # STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      # STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      # CALCOM_API_KEY: ${CALCOM_API_KEY}
    volumes:
      # Persist node_modules in a named volume so it doesn't get
      # overwritten by local bind mounts during development
      - node_modules:/app/node_modules
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  node_modules: